name: release-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run release gate (syntax, demo smoke, public scan, bilingual README parity)
        run: npm run release-check
